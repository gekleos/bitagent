name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a newer push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Python — lint + format + import sort + type-check on the operator dashboard.
  # ────────────────────────────────────────────────────────────────────────────
  python-lint:
    name: Python lint (ruff + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ui/requirements.txt

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.4

      - name: ruff check (lint)
        working-directory: ui
        run: ruff check . --output-format=github

      - name: ruff format --check
        working-directory: ui
        run: ruff format --check .

  python-deps-audit:
    name: Python deps audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.7.3

      # Five known vulns are tracked for an explicit dependency-bump PR
      # (jinja2 3.1.5→3.1.6, python-multipart 0.0.20→0.0.26, FastAPI
      # 0.115.x→0.122+ to pull starlette ≥0.49.1). Ignored here so CI gates
      # on *new* findings only. Re-evaluate after the bump PR lands.
      - name: Audit ui/requirements.txt
        run: |
          pip-audit \
            --requirement ui/requirements.txt \
            --strict \
            --ignore-vuln GHSA-cpwx-vrp4-4pq7 \
            --ignore-vuln GHSA-wp53-j4wj-2cfg \
            --ignore-vuln GHSA-mj87-hwqh-73pj \
            --ignore-vuln GHSA-2c2j-9gv5-cj73 \
            --ignore-vuln GHSA-7f5h-v6xp-fcq8

  # ────────────────────────────────────────────────────────────────────────────
  # Dockerfile + compose validation.
  # ────────────────────────────────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ui/Dockerfile
          format: tty
          failure-threshold: warning

  compose-validate:
    name: Compose file validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate every example compose file
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for f in examples/*.yml examples/*.yaml; do
            echo "::group::compose config $f"
            if ! docker compose -f "$f" config --quiet; then
              echo "::error file=$f::compose config failed"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

  # ────────────────────────────────────────────────────────────────────────────
  # Build the dashboard image (no push) — proves the Dockerfile still builds.
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (ui image, no push)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - python-lint
      - dockerfile-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (cache from GHA, do not push)
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: false
          load: true
          tags: bitagent-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke check — image starts and /healthz responds
        run: |
          set -euo pipefail
          docker run --rm -d --name bitagent-ui-ci -p 8080:8080 \
            -e DASHBOARD_API_KEY=ci-test-key \
            bitagent-ui:ci
          # Wait up to 30s for /healthz
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "Healthcheck OK after ${i}s"
              docker logs bitagent-ui-ci | tail -20
              docker stop bitagent-ui-ci
              exit 0
            fi
            sleep 1
          done
          echo "::error::Healthcheck did not respond within 30s"
          docker logs bitagent-ui-ci || true
          docker stop bitagent-ui-ci || true
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # Trivy scan on the freshly built image (filesystem mode, no daemon needed).
  # ────────────────────────────────────────────────────────────────────────────
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan (HIGH+CRITICAL, fail on findings)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          skip-dirs: "docs,site,.git"

  # ────────────────────────────────────────────────────────────────────────────
  # YAML / JSON / Markdown hygiene across the whole repo.
  # ────────────────────────────────────────────────────────────────────────────
  repo-lint:
    name: Repo lint (yamllint + actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: yamllint (relaxed, line-length warnings only)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/ examples/ mkdocs.yml
          config_data: |
            extends: relaxed
            rules:
              line-length: { max: 200, level: warning }
              comments: { min-spaces-from-content: 1 }
              truthy: disable

      - name: actionlint (workflow correctness)
        uses: raven-actions/actionlint@v2

  # ────────────────────────────────────────────────────────────────────────────
  # Gate job — single required status check that fans in everything above.
  # Branch protection lists this one job as required.
  # ────────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - python-lint
      - python-deps-audit
      - dockerfile-lint
      - compose-validate
      - docker-build
      - trivy-fs
      - repo-lint
    steps:
      - name: Verify every needed job succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          fail=0
          for job in python-lint python-deps-audit dockerfile-lint compose-validate docker-build trivy-fs repo-lint; do
            r=$(echo "$results" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['$job']['result'])")
            echo "$job: $r"
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              fail=1
            fi
          done
          exit $fail

name: Sanitize Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sanitize-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run sanitize scan
        run: python3 scripts/sanitize.py scan .

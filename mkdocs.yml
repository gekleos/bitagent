site_name: BitAgent
site_description: Self-hosted BitTorrent DHT crawler with native Sonarr/Radarr Torznab integration.
site_url: https://gekleos.github.io/bitagent/
repo_url: https://github.com/gekleos/bitagent
repo_name: gekleos/bitagent
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  logo: ../static/v1/logo.svg
  favicon: assets/favicon.svg

plugins:
  - search
  - mermaid2
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - Deployment: deployment.md
  - FAQ: faq.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - DHT crawler: concepts/dht-crawler.md
      - Classification: concepts/classification.md
      - Wantbridge: concepts/wantbridge.md
      - CSAM defense: concepts/csam-defense.md
      - Glossary: concepts/glossary.md
  - Dashboard:
      - UI guide: ui-guide.md
      - Wants: wants.md
      - Evidence pipeline: evidence.md
      - System tab: system-tab.md
      - Dashboard API: reference/dashboard-api.md
  - Reference:
      - Torznab API: reference/torznab-api.md
      - GraphQL API: reference/graphql-api.md
      - CLI: reference/cli.md
      - Metrics: reference/metrics.md
  - Integrations:
      - Sonarr: integrations/sonarr.md
      - Radarr: integrations/radarr.md
      - Readarr: integrations/readarr.md
      - Lidarr: integrations/lidarr.md
      - Prowlarr: integrations/prowlarr.md
      - Private tracker mode: integrations/private-tracker-mode.md
  - Operations:
      - Troubleshooting: troubleshooting.md
      - Monitoring: operations/monitoring.md
      - Performance tuning: operations/performance.md
      - Security: operations/security.md
      - Backup & restore: operations/backup-restore.md
      - Upgrade: operations/upgrade.md
  - Development:
      - Local setup: development/setup.md
  - Project:
      - Changelog: project/changelog.md
      - Legal disclaimer: legal/disclaimer.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gekleos/bitagent
  generator: false

copyright: "&copy; 2026 BitAgent contributors &middot; MIT licensed"
